<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thomas Tracker">
<meta name="theme-color" content="#f5f4f0" id="metaTheme">
<meta name="description" content="Thomas Tracker — personal task management module">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Thomas Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #eae8e3;
    --surface2: #dfddd8;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1a1a1a;
    --muted: #7a7870;
    --accent: #b8942e;
    --accent-vibrant: #d4a017;
    --accent-dim: rgba(180,148,46,0.12);
    --accent-dim2: rgba(180,148,46,0.25);
    --danger: #d94545;
    --danger-dim: rgba(217,69,69,0.12);
    --success: #2e9e5e;
    --success-dim: rgba(46,158,94,0.12);
    --work: #3b7dda;
    --work-dim: rgba(59,125,218,0.12);
    --inprogress: #c57b1a;
    --inprogress-dim: rgba(197,123,26,0.14);
    --font-mono: 'DM Mono', monospace;
    --font-serif: 'Playfair Display', serif;
    --radius: 8px;
    --radius-lg: 12px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --btn-text: #fff;
  }

  [data-theme="dark"] {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e6e0;
    --muted: #6b6a66;
    --accent: #d4a930;
    --accent-vibrant: #e8bf3a;
    --accent-dim: rgba(212,169,48,0.14);
    --accent-dim2: rgba(212,169,48,0.28);
    --danger: #e05555;
    --danger-dim: rgba(224,85,85,0.16);
    --success: #4ec97a;
    --success-dim: rgba(78,201,122,0.14);
    --work: #5a9ef0;
    --work-dim: rgba(90,158,240,0.14);
    --inprogress: #e8a030;
    --inprogress-dim: rgba(232,160,48,0.16);
    --btn-text: #0d0d0f;
  }

  html { background: var(--bg); }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 16px;
    min-height: 100vh;
    max-width: 540px;
    margin: 0 auto;
    padding-top: var(--safe-top);
    padding-bottom: calc(80px + var(--safe-bottom));
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 24px 20px 14px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: var(--safe-top);
    background: var(--bg);
    z-index: 10;
  }

  .header-left { display: flex; align-items: baseline; gap: 10px; }

  .header-title {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .header-module {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 2px 8px;
    border: 0.5px solid var(--border);
    border-radius: 20px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-meta {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    -webkit-tap-highlight-color: transparent;
    transition: color 0.15s;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:active { color: var(--text); }
  .icon-btn svg { width: 18px; height: 18px; }

  .stats-bar {
    padding: 10px 20px;
    display: flex;
    gap: 18px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
  }

  .stat {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .stat span { color: var(--text); font-weight: 500; }

  .add-zone {
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
  }

  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .add-input {
    flex: 1;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  .add-input:focus { border-color: var(--accent-vibrant); }
  .add-input::placeholder { color: var(--muted); }

  .add-btn {
    background: var(--accent-vibrant);
    border: none;
    border-radius: var(--radius);
    color: var(--btn-text);
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    width: 44px;
    height: 44px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .add-btn:active { opacity: 0.75; }

  .meta-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .priority-select {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    -webkit-appearance: none;
    appearance: none;
  }
  .priority-select:focus { border-color: var(--accent-vibrant); color: var(--text); }

  .work-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 6px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    transition: all 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .work-toggle.on { background: var(--work-dim); border-color: var(--work); }
  .work-toggle-label {
    font-size: 12px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .work-toggle.on .work-toggle-label { color: var(--work); }
  .work-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.15s;
  }
  .work-toggle.on .work-dot { background: var(--work); }

  .filters {
    display: flex;
    gap: 6px;
    padding: 10px 20px;
    border-bottom: 0.5px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--bg);
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-btn:active { opacity: 0.7; }
  .filter-btn.active { background: var(--accent-dim2); border-color: var(--accent-vibrant); color: var(--accent-vibrant); font-weight: 500; }

  .task-list { padding: 4px 0; }

  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
  }
  .task-item.done { opacity: 0.45; }

  .task-body { flex: 1; min-width: 0; }

  .task-desc {
    font-size: 15px;
    line-height: 1.55;
    color: var(--text);
    word-break: break-word;
  }
  .task-item.done .task-desc { text-decoration: line-through; color: var(--muted); }

  .task-badges {
    display: flex;
    gap: 5px;
    margin-top: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    font-size: 11px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }
  .badge-tappable {
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .badge-tappable:active { transform: scale(0.93); }

  .badge-high { background: var(--danger-dim); color: var(--danger); }
  .badge-medium { background: var(--accent-dim); color: var(--accent); }
  .badge-low { background: rgba(107,106,102,0.18); color: var(--muted); }
  .badge-work { background: var(--work-dim); color: var(--work); }
  .badge-sent { background: var(--success-dim); color: var(--success); }

  .badge-open { background: var(--work-dim); color: var(--work); }
  .badge-inprogress { background: var(--inprogress-dim); color: var(--inprogress); }
  .badge-done { background: var(--success-dim); color: var(--success); }

  .task-date {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .task-actions {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex-shrink: 0;
  }

  .action-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 9px;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn.send { border-color: rgba(59,125,218,0.4); color: var(--work); }
  .action-btn.send:active { background: var(--work-dim); }
  .action-btn.del:active { border-color: var(--danger); color: var(--danger); }

  .empty-state {
    padding: 56px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .toast {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    padding: 10px 18px;
    border-radius: var(--radius-lg);
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
    letter-spacing: 0.04em;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .settings-overlay.hidden { display: none; }

  .settings-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
  }

  .settings-title {
    font-family: var(--font-serif);
    font-size: 20px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .settings-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.04em;
    line-height: 1.6;
    margin-bottom: 22px;
  }

  .settings-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }

  .settings-input {
    width: 100%;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
    margin-bottom: 18px;
  }
  .settings-input:focus { border-color: var(--accent-vibrant); }
  .settings-input::placeholder { color: var(--muted); }

  .settings-actions { display: flex; gap: 10px; }

  .settings-btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .settings-btn.primary { background: var(--accent-vibrant); border: none; color: var(--btn-text); font-weight: 500; }
  .settings-btn.secondary { background: none; border: 0.5px solid var(--border2); color: var(--muted); }
  .settings-btn:active { opacity: 0.75; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="header-title">Thomas</div>
    <div class="header-module">Tracker</div>
  </div>
  <div class="header-right">
    <div class="header-meta" id="headerDate"></div>
    <button class="icon-btn" id="themeBtn" aria-label="Toggle theme">
      <svg id="sunIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg id="moonIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <button class="icon-btn" id="gearBtn" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>
</header>

<div class="stats-bar" id="statsBar"></div>

<div class="add-zone">
  <div class="add-row">
    <input class="add-input" id="taskInput" type="text" placeholder="Add a task..." autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="add-btn" id="addBtn" aria-label="Add task">+</button>
  </div>
  <div class="meta-row">
    <select class="priority-select" id="prioritySelect" aria-label="Priority">
      <option value="medium">Medium</option>
      <option value="high">High</option>
      <option value="low">Low</option>
    </select>
    <div class="work-toggle" id="workToggle" role="button" aria-label="Flag as work task">
      <div class="work-dot"></div>
      <span class="work-toggle-label">Work</span>
    </div>
  </div>
</div>

<div class="filters" role="tablist">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="open">Open</button>
  <button class="filter-btn" data-filter="inprogress">In Progress</button>
  <button class="filter-btn" data-filter="done">Done</button>
  <button class="filter-btn" data-filter="work">Work</button>
  <button class="filter-btn" data-filter="high">High</button>
</div>

<div class="task-list" id="taskList" role="list"></div>

<div class="toast" id="toast"></div>

<div class="settings-overlay hidden" id="settingsOverlay">
  <div class="settings-card">
    <div class="settings-title">Settings</div>
    <div class="settings-sub" id="settingsSub">Enter your work email address. It stays on your local device.</div>
    <label class="settings-label" for="emailInput">Work email</label>
    <input class="settings-input" id="emailInput" type="email" placeholder="you@yourorg.com" autocomplete="email" />
    <div class="settings-actions">
      <button class="settings-btn secondary hidden" id="settingsCancelBtn">Cancel</button>
      <button class="settings-btn primary" id="settingsSaveBtn">Save</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'thomas_tracker_v1';
const SETTINGS_KEY = 'thomas_tracker_settings_v1';
const THEME_KEY = 'thomas_tracker_theme';

const STATES = ['open', 'inprogress', 'done'];
const STATE_LABELS = { open: 'Open', inprogress: 'In Progress', done: 'Done' };
const PRIORITIES = ['medium', 'high', 'low'];

let tasks = [];
let filter = 'all';
let workFlagOn = false;
let settings = { workEmail: '' };
let currentTheme = 'light';

/* ── Theme ── */
function loadTheme() {
  currentTheme = localStorage.getItem(THEME_KEY) || 'light';
  applyTheme();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  document.getElementById('metaTheme').setAttribute('content', currentTheme === 'dark' ? '#0d0d0f' : '#f5f4f0');
  document.getElementById('sunIcon').style.display = currentTheme === 'light' ? 'block' : 'none';
  document.getElementById('moonIcon').style.display = currentTheme === 'dark' ? 'block' : 'none';
}

function toggleTheme() {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, currentTheme);
  applyTheme();
}

/* ── Settings ── */
function loadSettings() {
  try { settings = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || { workEmail: '' }; }
  catch { settings = { workEmail: '' }; }
}

function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

function getWorkEmail() { return settings.workEmail || ''; }

function openSettings(isFirstRun = false) {
  const overlay = document.getElementById('settingsOverlay');
  const cancelBtn = document.getElementById('settingsCancelBtn');
  const sub = document.getElementById('settingsSub');
  document.getElementById('emailInput').value = settings.workEmail || '';
  if (isFirstRun) {
    sub.textContent = 'One-time setup. Enter your work email to enable task routing. Stored on your device only — never in the repo.';
    cancelBtn.classList.add('hidden');
  } else {
    sub.textContent = 'Your work email for task routing. Stored on your device only.';
    cancelBtn.classList.remove('hidden');
  }
  overlay.classList.remove('hidden');
  setTimeout(() => document.getElementById('emailInput').focus(), 100);
}

function closeSettings() {
  document.getElementById('settingsOverlay').classList.add('hidden');
}

function saveSettingsFromUI() {
  const email = document.getElementById('emailInput').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('emailInput').focus();
    showToast('Enter a valid email');
    return;
  }
  settings.workEmail = email;
  saveSettings();
  closeSettings();
  showToast('Settings saved');
  render();
}

/* ── Tasks ── */
function loadTasks() {
  try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { tasks = []; }
}

function saveTasks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function uuid() {
  return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, c =>
    (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16));
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function setHeaderDate() {
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function addTask() {
  const input = document.getElementById('taskInput');
  const desc = input.value.trim();
  if (!desc) { input.focus(); return; }
  const priority = document.getElementById('prioritySelect').value;
  tasks.unshift({
    id: uuid(),
    description: desc,
    created: new Date().toISOString(),
    priority,
    workFlag: workFlagOn,
    workSent: false,
    telegramSynced: false,
    tags: [],
    status: 'open'
  });
  saveTasks();
  input.value = '';
  workFlagOn = false;
  updateWorkToggle();
  render();
  showToast('Task added');
}

function cycleState(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const idx = STATES.indexOf(t.status);
  t.status = STATES[(idx + 1) % STATES.length];
  if (t.status === 'done') t.completed = new Date().toISOString();
  saveTasks();
  render();
}

function cyclePriority(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const idx = PRIORITIES.indexOf(t.priority);
  t.priority = PRIORITIES[(idx + 1) % PRIORITIES.length];
  saveTasks();
  render();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  render();
  showToast('Task removed');
}

function sendToWork(id) {
  const workEmail = getWorkEmail();
  if (!workEmail) { openSettings(false); showToast('Set work email first'); return; }
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  const subject = encodeURIComponent('[Thomas Tracker] ' + t.description);
  const body = encodeURIComponent(
    'Task: ' + t.description + '\n' +
    'Priority: ' + t.priority.toUpperCase() + '\n' +
    'Created: ' + formatDate(t.created) + '\n\n' +
    '— Sent from Thomas Tracker'
  );
  window.location.href = 'mailto:' + workEmail + '?subject=' + subject + '&body=' + body;
  t.workSent = true;
  saveTasks();
  render();
  showToast('Opening mail client');
}

function filteredTasks() {
  return tasks.filter(t => {
    if (filter === 'all') return true;
    if (filter === 'open') return t.status === 'open';
    if (filter === 'inprogress') return t.status === 'inprogress';
    if (filter === 'done') return t.status === 'done';
    if (filter === 'work') return t.workFlag;
    if (filter === 'high') return t.priority === 'high';
    return true;
  });
}

function updateWorkToggle() {
  document.getElementById('workToggle').classList.toggle('on', workFlagOn);
}

function renderStats() {
  const open = tasks.filter(t => t.status === 'open').length;
  const inprog = tasks.filter(t => t.status === 'inprogress').length;
  const work = tasks.filter(t => t.workFlag && t.status !== 'done').length;
  const high = tasks.filter(t => t.priority === 'high' && t.status !== 'done').length;
  document.getElementById('statsBar').innerHTML =
    `<div class="stat"><span>${open}</span> open</div>` +
    `<div class="stat"><span>${inprog}</span> in prog</div>` +
    `<div class="stat"><span>${work}</span> work</div>` +
    `<div class="stat"><span>${high}</span> high</div>`;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  renderStats();
  const list = document.getElementById('taskList');
  const visible = filteredTasks();

  if (!visible.length) {
    list.innerHTML = '<div class="empty-state">No tasks here</div>';
    return;
  }

  list.innerHTML = visible.map(t => {
    const done = t.status === 'done';
    const stateClass = t.status === 'inprogress' ? 'inprogress' : t.status;

    const badges = [];
    badges.push(`<span class="badge badge-${stateClass} badge-tappable" onclick="cycleState('${t.id}')" title="Tap to change state">${STATE_LABELS[t.status]}</span>`);
    badges.push(`<span class="badge badge-${t.priority} badge-tappable" onclick="cyclePriority('${t.id}')" title="Tap to change priority">${t.priority}</span>`);
    if (t.workFlag) badges.push(`<span class="badge badge-work">Work</span>`);
    if (t.workSent) badges.push(`<span class="badge badge-sent">Sent</span>`);

    const sendBtn = (t.workFlag && !t.workSent && !done)
      ? `<button class="action-btn send" onclick="sendToWork('${t.id}')">Send</button>` : '';

    return `<div class="task-item${done ? ' done' : ''}" role="listitem">
      <div class="task-body">
        <div class="task-desc">${esc(t.description)}</div>
        <div class="task-badges">
          ${badges.join('')}
          <span class="task-date">${formatDate(t.created)}</span>
        </div>
      </div>
      <div class="task-actions">
        ${sendBtn}
        <button class="action-btn del" onclick="deleteTask('${t.id}')">Del</button>
      </div>
    </div>`;
  }).join('');
}

/* ── Event listeners ── */
document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});
document.getElementById('workToggle').addEventListener('click', () => {
  workFlagOn = !workFlagOn;
  updateWorkToggle();
});
document.getElementById('themeBtn').addEventListener('click', toggleTheme);
document.getElementById('gearBtn').addEventListener('click', () => openSettings(false));
document.getElementById('settingsSaveBtn').addEventListener('click', saveSettingsFromUI);
document.getElementById('settingsCancelBtn').addEventListener('click', closeSettings);
document.getElementById('emailInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveSettingsFromUI();
  if (e.key === 'Escape') closeSettings();
});
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    render();
  });
});

/* ── Init ── */
loadTheme();
setHeaderDate();
loadSettings();
loadTasks();
render();
if (!settings.workEmail) openSettings(true);
</script>
</body>
</html>
